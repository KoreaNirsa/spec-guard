openapi: 3.1.0
info:
  title: User Auth API
  version: 0.1.0
paths:
  /auth/login:
    post:
      responses:
        "200":
          description: Token pair issued
        "400":
          description: Invalid request
        "401":
          description: Invalid credentials
        "423":
          description: Account locked
  /auth/refresh:
    post:
      responses:
        "200":
          description: Rotated token pair issued
        "401":
          description: Invalid or replayed refresh token
