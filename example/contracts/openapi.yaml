openapi: 3.1.0
info:
  title: Team Invite API
  version: 0.1.0
paths:
  /workspaces/{workspaceId}/invites:
    post:
      summary: Create or return a pending team invite
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCreateRequest"
      responses:
        "201":
          description: Pending invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "200":
          description: Existing pending invite returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "400":
          $ref: "#/components/responses/InvalidEmail"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Already a member or idempotency key reused with a different body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /workspaces/{workspaceId}/invites/{inviteId}:
    delete:
      summary: Revoke a pending team invite
      parameters:
        - $ref: "#/components/parameters/WorkspaceId"
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pending invite revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Invite not found in workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Invite is already accepted, revoked, or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /invites/accept:
    post:
      summary: Accept a team invite for the authenticated invited user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteAcceptRequest"
      responses:
        "201":
          description: Membership created and invite accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteAcceptResponse"
        "400":
          description: Malformed, expired, revoked, accepted, or wrong-workspace token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: Authenticated user email does not match invitee email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Membership already exists or token was accepted concurrently
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 128
  responses:
    InvalidEmail:
      description: Missing or invalid invitee email
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthenticated:
      description: Missing authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated user is not allowed to perform this invite action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    InviteCreateRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
        message:
          type: string
          maxLength: 500
      additionalProperties: false
    InviteResponse:
      type: object
      required:
        - schema_version
        - correlation_id
        - invite_id
        - workspace_id
        - email
        - status
        - expires_at
        - delivery_status
      properties:
        schema_version:
          const: team_invite.response.v1
        correlation_id:
          type: string
        invite_id:
          type: string
        workspace_id:
          type: string
        email:
          type: string
          format: email
        status:
          type: string
          enum:
            - pending
            - accepted
            - revoked
            - expired
        expires_at:
          type: string
          format: date-time
        delivery_status:
          type: string
          enum:
            - sent
            - failed
        audit_event_id:
          type: string
    InviteAcceptRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Signed invite token submitted in the request body; server logs and traces must redact this field.
      additionalProperties: false
    InviteAcceptResponse:
      type: object
      required:
        - schema_version
        - correlation_id
        - invite_id
        - workspace_id
        - membership_id
        - status
      properties:
        schema_version:
          const: team_invite.response.v1
        correlation_id:
          type: string
        invite_id:
          type: string
        workspace_id:
          type: string
        membership_id:
          type: string
        status:
          const: accepted
        audit_event_id:
          type: string
    ErrorResponse:
      type: object
      required:
        - schema_version
        - correlation_id
        - error_code
        - message
      properties:
        schema_version:
          const: team_invite.response.v1
        correlation_id:
          type: string
        error_code:
          type: string
          enum:
            - INVALID_EMAIL
            - UNAUTHENTICATED
            - FORBIDDEN
            - WORKSPACE_NOT_ACTIVE
            - DUPLICATE_PENDING_INVITE
            - IDEMPOTENCY_KEY_REUSED
            - ALREADY_MEMBER
            - INVITE_EXPIRED
            - INVITE_REVOKED
            - INVITE_ALREADY_ACCEPTED
            - INVALID_INVITE_TOKEN
            - INVITEE_EMAIL_MISMATCH
            - WRONG_WORKSPACE
            - INVITE_NOT_FOUND
            - INVITE_NOT_PENDING
        message:
          type: string
        audit_event_id:
          type: string
