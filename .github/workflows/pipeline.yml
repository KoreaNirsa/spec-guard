name: SpecGuard Pipeline

on:
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  readiness-gate:
    name: SpecGuard Readiness Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run SpecGuard readiness gate
        run: python -m tools.pr_readiness_gate --base-ref "origin/${{ github.base_ref }}" --head-ref HEAD --spec-root specs

  passing-example:
    name: Passing Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run example
        run: python -m cli.specguard run examples/example --no-llm --no-follow-up

  risk-example:
    name: Risk Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Confirm todo-api is ready with warnings
        run: |
          python -m cli.specguard run examples/risk/todo-api --no-llm --no-follow-up
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("examples/risk/todo-api/readiness-review.json").read_text())
          assert report["blocked"] is False
          assert report["readiness"]["status"] == "ready_with_warnings"
          assert report["summary"]["major"] == 1
          PY
