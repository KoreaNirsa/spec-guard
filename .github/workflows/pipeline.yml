name: SpecGuard Pipeline

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest

      - name: Run User Auth Example
        run: python tools/runner.py examples/user-auth

      - name: Run Todo API Risk Example
        run: |
          set +e
          python tools/runner.py examples/risk/todo-api
          code=$?
          if [ "$code" -ne 1 ]; then
            echo "todo-api should be blocked by Grill Me findings"
            exit 1
          fi
