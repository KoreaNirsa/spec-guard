name: SpecGuard Pipeline

on:
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest

  passing-example:
    name: Passing Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run user-auth
        run: python tools/runner.py examples/user-auth

  risk-example:
    name: Risk Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Confirm todo-api is blocked
        run: |
          set +e
          python tools/runner.py examples/risk/todo-api
          code=$?
          if [ "$code" -ne 1 ]; then
            echo "risk example should be blocked by Grill Me findings"
            exit 1
          fi
