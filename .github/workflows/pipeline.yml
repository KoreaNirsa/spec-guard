name: SpecGuard Pipeline

on:
  pull_request:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest

  passing-example:
    name: Passing Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run example
        run: python -m cli.specguard run examples/example --no-llm --no-follow-up

  risk-example:
    name: Risk Example
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Confirm todo-api is blocked
        run: |
          set +e
          python -m cli.specguard run examples/risk/todo-api --no-llm --no-follow-up
          code=$?
          if [ "$code" -ne 1 ]; then
            echo "risk example should be blocked by Readiness Findings"
            exit 1
          fi
