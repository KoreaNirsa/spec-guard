name: SpecGuard PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: specguard-pr-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  advisory-review:
    name: SpecGuard PR Reviewer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -r requirements.txt

      - name: Build PR diff
        run: |
          git fetch --no-tags origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git diff --no-ext-diff "origin/${{ github.base_ref }}"...HEAD > pr.diff

      - name: Run SpecGuard PR reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.SPECGUARD_OPENAI_API_KEY }}
          SPECGUARD_OPENAI_API_KEY: ${{ secrets.SPECGUARD_OPENAI_API_KEY }}
          SPECGUARD_PR_REVIEW_MODE: advisory
          SPECGUARD_PR_REVIEW_MODEL: ${{ vars.SPECGUARD_PR_REVIEW_MODEL }}
          SPECGUARD_REVIEW_SPEC_PATHS: ${{ vars.SPECGUARD_REVIEW_SPEC_PATHS }}
        run: >-
          python -m tools.pr_review
          --diff-file pr.diff
          --pr-number "${{ github.event.pull_request.number }}"
          --head-sha "${{ github.event.pull_request.head.sha }}"
          --repo "${{ github.repository }}"
          --mode advisory
          --output-file specguard-pr-review.md
          --prompt-file specguard-pr-review.prompt.md

      - name: Publish advisory comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('specguard-pr-review.md', 'utf8');
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request payload; skipping comment.');
              return;
            }
            const markerPrefix = `<!-- specguard-pr-review:${pr.number}:`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(markerPrefix));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
